# Enforces repository configuration as code.
# Reconciles GitHub settings from checked-in JSON files on a daily schedule,
# on config file changes, or on manual trigger.
#
# Requires a fine-grained PAT stored as REPO_ADMIN_TOKEN with:
#   - Administration: read/write
#   - Metadata: read

name: Enforce Repo Configuration

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  push:
    branches: [master]
    paths:
      - ".github/repo-config.json"
      - ".github/branch-protection.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  enforce:
    name: Apply Repository Settings
    runs-on: ubuntu-latest

    steps:
      - name: Checkout config files
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github

      - name: Apply repository settings
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
        run: |
          echo "Applying repository settings..."

          # Extract topics (handled via separate endpoint)
          TOPICS=$(jq -c '.topics' .github/repo-config.json)

          # Apply general repo settings (exclude topics and security analysis —
          # those use separate handling/endpoints).
          jq 'del(.topics, .security_and_analysis)' .github/repo-config.json | \
            gh api repos/${{ github.repository }} \
              --method PATCH \
              --input -

          # Apply topics
          echo "{\"names\": $TOPICS}" | \
            gh api repos/${{ github.repository }}/topics \
              --method PUT \
              --input -

          echo "Repository settings applied."

      - name: Apply branch protection
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
        run: |
          echo "Applying branch protection for master..."

          if gh api repos/${{ github.repository }}/branches/master/protection \
            --method PUT \
            --input .github/branch-protection.json 2>&1; then
            echo "Branch protection applied."
          else
            echo "::warning::Branch protection could not be applied. Check repository plan eligibility and REPO_ADMIN_TOKEN permissions."
            echo "- **Branch protection**: Not applied; check repository plan eligibility and REPO_ADMIN_TOKEN permissions" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Restrict GitHub Actions to verified
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
        run: |
          echo "Restricting Actions to GitHub-owned and verified creators..."

          gh api repos/${{ github.repository }}/actions/permissions \
            --method PUT \
            --field enabled=true \
            --field allowed_actions=selected

          gh api repos/${{ github.repository }}/actions/permissions/selected-actions \
            --method PUT \
            --field github_owned_allowed=true \
            --field verified_allowed=true \
            --field patterns='[]'

          echo "Actions restrictions applied."

      - name: Enforce security features
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
        run: |
          echo "Enforcing security features..."

          # Enable Dependabot vulnerability alerts
          gh api repos/${{ github.repository }}/vulnerability-alerts \
            --method PUT

          # Enable Dependabot security updates (auto PRs for vulnerabilities)
          gh api repos/${{ github.repository }}/automated-security-fixes \
            --method PUT

          # Enable private vulnerability reporting
          if gh api repos/${{ github.repository }}/private-vulnerability-reporting \
            --method PUT 2>&1; then
            echo "Private vulnerability reporting enabled."
          else
            echo "::warning::Private vulnerability reporting could not be enabled. Check feature availability and REPO_ADMIN_TOKEN permissions."
            echo "- **Private vulnerability reporting**: Not enabled; check feature availability and REPO_ADMIN_TOKEN permissions" >> $GITHUB_STEP_SUMMARY
          fi

          SECURITY_AND_ANALYSIS=$(jq -c '.security_and_analysis // empty' .github/repo-config.json)
          SECURITY_AND_ANALYSIS_WITHOUT_ADVANCED=$(jq -c '.security_and_analysis // {} | del(.advanced_security)' .github/repo-config.json)
          ADVANCED_SECURITY=$(jq -c '.security_and_analysis.advanced_security // empty' .github/repo-config.json)

          if [ -z "$SECURITY_AND_ANALYSIS" ]; then
            echo "No security_and_analysis settings configured."
          else
            if [ "$SECURITY_AND_ANALYSIS_WITHOUT_ADVANCED" != "{}" ]; then
              echo "Applying security and analysis settings..."

              if SECURITY_OUTPUT=$(jq -n --argjson security "$SECURITY_AND_ANALYSIS_WITHOUT_ADVANCED" \
                '{ security_and_analysis: $security }' | \
                gh api repos/${{ github.repository }} \
                  --method PATCH \
                  --input - 2>&1); then
                echo "Security and analysis settings applied."
              else
                echo "$SECURITY_OUTPUT"
                echo "::warning::Security and analysis settings could not be applied. See GitHub API output above."
                echo "- **Security and analysis settings**: Not fully applied; see workflow logs for GitHub API response" >> $GITHUB_STEP_SUMMARY
              fi
            fi

            if [ -n "$ADVANCED_SECURITY" ]; then
              echo "Applying Advanced Security setting..."

              if ADVANCED_SECURITY_OUTPUT=$(jq -n --argjson advanced "$ADVANCED_SECURITY" \
                '{ security_and_analysis: { advanced_security: $advanced } }' | \
                gh api repos/${{ github.repository }} \
                  --method PATCH \
                  --input - 2>&1); then
                echo "Advanced Security setting applied."
              else
                echo "$ADVANCED_SECURITY_OUTPUT"
                echo "::warning::Advanced Security setting could not be applied. See GitHub API output above."
                echo "- **Advanced Security**: Not applied; see workflow logs for GitHub API response" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          fi

          echo "Security feature enforcement complete."

      - name: Verify applied settings
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
        run: |
          echo "## Repo Config Enforcement Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Verify repo settings
          CURRENT=$(gh api repos/${{ github.repository }} --jq '{
            description: .description,
            has_wiki: .has_wiki,
            has_projects: .has_projects,
            allow_squash_merge: .allow_squash_merge,
            allow_merge_commit: .allow_merge_commit,
            allow_rebase_merge: .allow_rebase_merge,
            delete_branch_on_merge: .delete_branch_on_merge
          }')
          echo "### Repository Settings" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$CURRENT" | jq . >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Verify topics
          TOPICS=$(gh api repos/${{ github.repository }}/topics --jq '.names')
          echo "### Topics" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$TOPICS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Verify security and analysis settings
          SECURITY=$(gh api repos/${{ github.repository }} --jq '.security_and_analysis // {}')
          echo "### Security And Analysis" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$SECURITY" | jq . >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Verify actions permissions
          ACTIONS=$(gh api repos/${{ github.repository }}/actions/permissions --jq '{enabled: .enabled, allowed_actions: .allowed_actions}')
          echo "### Actions Permissions" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$ACTIONS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Verify branch protection (may depend on repository plan or token permissions)
          echo "" >> $GITHUB_STEP_SUMMARY
          if PROTECTION=$(gh api repos/${{ github.repository }}/branches/master/protection --jq '{
            required_status_checks: .required_status_checks.contexts,
            enforce_admins: .enforce_admins.enabled,
            allow_force_pushes: .allow_force_pushes.enabled,
            allow_deletions: .allow_deletions.enabled
          }' 2>&1); then
            echo "### Branch Protection" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            echo "$PROTECTION" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "### Branch Protection" >> $GITHUB_STEP_SUMMARY
            echo "> Not available; check repository plan eligibility and REPO_ADMIN_TOKEN permissions" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Enforcement complete." >> $GITHUB_STEP_SUMMARY
